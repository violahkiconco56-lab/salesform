<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
  .form-control, .form-select{
    background-color: lightgrey;
  }

</style>

<body>
    <div class="container">
        <div class="sidebar">
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="stock.html">Nyondo stock system</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="index.html">sales Registration Form</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="supplier.html">supplier Management</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#"></a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link disabled" aria-disabled="stock">Stock Registration Form</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        <!--end nav-->
        <div class="row">
          <div class="col-3 bg-body-secondary">
            <div>
              <img src="nyodo-logo.png" alt="nyodo-logo.png" width="200px" height="200px">
            </div>
           <h1> NYONDO GENERAL HARDWARE</h1>
      </div>
      <div class="col-9 bg-primary-subtle">

        <form action="">
          <h1 class="text-center">Stock Registration Form</h1>
          <div class="row my-3">

            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Item Name</label>
              <input type="text" class="form-control" placeholder="Enter Item" aria-label="Enter Item">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Category</label>
              <select class="form-select" aria-label="Default select example">
                <option selected>Open this select menu</option>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
              </select>
            </div>
          </div>
          <!--end sec 1-->
          <div class="row my-3">

            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Item Code</label>
              <input type="text" class="form-control" placeholder="Enter Item Code" aria-label="Enter Item Code">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Quantity</label>
              <input type="text" class="form-control" placeholder="quantity" aria-label="quantity">
            </div>
          </div>
          
          <!--end sec2-->
          <div class="row my-3">

            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Unit</label>
              <input type="text" class="form-control" placeholder="unit" aria-label="unit">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Buying Price</label>
              <input type="text" class="form-control" placeholder="Buying Price" aria-label="Buying Price">
            </div>
          </div>
          
          <!--sec3-->
          <div class="row my-3">

            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Supplier Name</label>
              <input type="text" class="form-control" placeholder="Supplier Name" aria-label="Supplier Name">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Supplier Contact</label>
              <input type="tel" class="form-control" placeholder="Supplier Contact" aria-label="Enter Contact">
            </div>
          </div>
          <!--sec4-->
          <div class="row my-3">

            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Date Received</label>
              <input type="date" class="form-control" placeholder="Enter date" aria-label="Enter date">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Storage Location</label>
              <input type="type" class="form-control" placeholder="Storage Location" aria-label="Storage Location">
            </div>
          </div>
          <!--sec5-->
          <div class="row my-3">

            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Discription</label>
              <input type="textarea" class="form-control" placeholder="Enter discription" aria-label="Enter discription">
            </div>
            
          </div>
          <!--sec6-->
          <div class="row">
            <div class="col">
          <button type="button" class="btn btn-primary btn-sm">Cancel</button>
          </div>
          <div class="col text-end">
          <button type="button" class="btn btn-secondary btn-sm">Submit</button>
          </div>
          </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
